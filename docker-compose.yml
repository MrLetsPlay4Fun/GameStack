services:
  backend:
    build: ./backend
    container_name: gamestack-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      DATABASE_URL: file:/data/gamestack.db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SERVERS_PATH: /data/servers
      BACKUPS_PATH: /data/backups
    volumes:
      # Datenbank persistieren
      - gamestack-data:/data
      # Game-Server-Daten persistieren (außerhalb des Containers)
      - ${SERVERS_PATH:-./data/servers}:/data/servers
      - ${BACKUPS_PATH:-./data/backups}:/data/backups
    ports:
      - "3001:3001"
    networks:
      - gamestack

  frontend:
    build: ./frontend
    container_name: gamestack-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - gamestack

volumes:
  gamestack-data:

networks:
  gamestack:
    driver: bridge
